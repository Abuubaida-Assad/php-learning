<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Registration</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
        }

        .container {
            width: 420px;
            margin: 80px auto;
            padding: 25px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 0 12px gray;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 12px 0;
        }

        label {
            width: 40%;
            font-weight: bold;
        }

        input, select {
            width: 55%;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: green;
            box-shadow: 0 0 3px green;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Customer Info</h2>

    <form action="addcustomer.php" method="get">

        <div class="form-group">
            <label>CID</label>
            <input type="text" name="cid" required>
        </div>

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="cname" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" required>
        </div>

        <!-- STATE DROPDOWN -->
        <div class="form-group">
            <label>State</label>
            <select id="state" name="state" required>
                <option value="">Select State</option>
            </select>
        </div>

        <!-- CITY DROPDOWN -->
        <div class="form-group">
            <label>City</label>
            <select id="city" name="city" required>
                <option value="">Select City</option>
            </select>
        </div>

        <button type="submit">Save</button>

    </form>
</div>

<script>
let allData = [];

async function loadData() {
    const res = await fetch("https://raw.githubusercontent.com/nshntarora/Indian-Cities-JSON/master/cities.json");
    allData = await res.json();

    const stateSelect = document.getElementById("state");

    // unique states
    const states = [...new Set(allData.map(item => item.state))];

    states.sort().forEach(state => {
        const option = document.createElement("option");
        option.value = state;
        option.textContent = state;
        stateSelect.appendChild(option);
    });
}

// when state changes → load cities
document.getElementById("state").addEventListener("change", function () {
    const selectedState = this.value;
    const citySelect = document.getElementById("city");

    citySelect.innerHTML = "<option value=''>Select City</option>";

    const filteredCities = allData.filter(item => item.state === selectedState);

    filteredCities.forEach(city => {
        const option = document.createElement("option");
        option.value = city.name;
        option.textContent = city.name;
        citySelect.appendChild(option);
    });
});

// load on page start
loadData();
</script>

</body>
</html>
